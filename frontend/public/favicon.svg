<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Emerald Gradient to match text-emerald-400 and border-emerald-800 -->
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#065F46" /> <!-- Emerald 800 -->
      <stop offset="50%" stop-color="#10B981" /> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Emerald 400 (Logo Color) -->
    </linearGradient>
    <!-- Soft drop shadow for depth -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#022C22" flood-opacity="0.55" />
    </filter>
  </defs>

  <!-- Circular background with Emerald gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#emerald-grad)" />

  <!-- White Shopping Bag icon -->
  <g fill="none" stroke="#FFFFFF" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft-shadow)">
    <!-- Shopping Bag Handle -->
    <path d="M190,200 V160 C190,123.5 219.5,94 256,94 C292.5,94 322,123.5 322,160 V200" />
    <!-- Shopping Bag Body (Filled White) -->
    <path d="M140,190 H372 L394,400 H118 Z" fill="#FFFFFF" stroke="none" />
    <!-- Shopping Bag Body Outline -->
    <path d="M140,190 H372 L394,400 H118 Z" />
    <!-- Decorative Heart in the center in Emerald color -->
    <path d="M256,330 C256,330 226,300 226,280 C226,268.9 234.9,260 246,260 C252.1,260 256,265 256,265 C256,265 259.9,260 266,260 C277.1,260 286,268.9 286,280 C286,300 256,330 256,330 Z" fill="url(#emerald-grad)" stroke="none" />
  </g>
</svg>